# ===================================================================
# Production Configuration - Petcare Application
# ===================================================================
# Este archivo debe ser usado con: spring.profiles.active=prod
# ===================================================================

# ===================================================================
# LOGGING CONFIGURATION - Production
# ===================================================================
# Production: WARN level to reduce log volume and protect sensitive data
debug=false
spring.main.banner-mode=console

logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=INFO
logging.level.com.petcare=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=INFO
logging.level.org.springframework.data=WARN
logging.level.org.hibernate.orm.jdbc.bind=INFO

# Security - Don't log sensitive data
logging.level.org.springframework.security.core.userdetails.UserDetails=INFO
logging.level.org.springframework.security.authentication=WARN

# Mail - Minimal logging in production
spring.mail.debug=false

# ===================================================================
# JPA/HIBERNATE - Production
# ===================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ===================================================================
# actuator - Production
# ===================================================================
# Secure actuator endpoints (handled in WebAuthorization.java)
# Only health and info are publicly accessible
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.roles=ADMIN

# ===================================================================
# SERVER - Production
# ===================================================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ===================================================================
# SECURITY HEADERS - Production
# ===================================================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Server Configuration
server.port=${PORT:8080}