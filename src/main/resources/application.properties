spring.application.name=Petcare

# Configuraciï¿½n de la conexiï¿½n a la base de datos MySQL (con placeholders)
#spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/petcare # Utiliza las variables de entorno para la configuraciï¿½n
spring.datasource.url=jdbc:mysql://localhost:3306/petcare
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petcare_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petcare_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciï¿½n de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuraciï¿½n de la conexiï¿½n SMTP (con placeholders)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@petcare.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:password}
petcare.email.max-attachment-size=10485760
petcare.email.default-from=${SPRING_MAIL_USERNAME:noreply@petcare.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.debug=false  # Deshabilitado para reducir logs en prod

# Configuraciï¿½n de HikariCP
spring.datasource.hikari.maximum-pool-size=20

# Nï¿½mero mï¿½nimo de conexiones que se mantendrï¿½n en el pool,
# incluso si estï¿½n inactivas. Este valor debe ser ajustado
# para balancear la latencia y el uso de recursos.
spring.datasource.hikari.minimum-idle=5

# Tiempo mï¿½ximo (en milisegundos) que una conexiï¿½n puede estar inactiva
# en el pool antes de ser eliminada. Un valor mï¿½s bajo puede liberar recursos,
# pero puede aumentar la latencia para nuevas conexiones.
spring.datasource.hikari.idle-timeout=60000

# Tiempo mï¿½ximo (en milisegundos) que una solicitud de conexiï¿½n
# puede estar esperando en la cola antes de lanzar una excepciï¿½n.
# Este valor debe ser ajustado segï¿½n la latencia aceptable para la aplicaciï¿½n.
spring.datasource.hikari.connection-timeout=30000

# Tiempo mï¿½ximo de vida (en milisegundos) de una conexiï¿½n en el pool.
# Despuï¿½s de este tiempo, la conexiï¿½n serï¿½ eliminada y reemplazada
# por una nueva. Esto ayuda a mitigar problemas de conexiï¿½n a largo plazo.
spring.datasource.hikari.max-lifetime=1800000

# Configuraciï¿½n del servidor
server.address=0.0.0.0
server.port=8088
server.forward-headers-strategy=native

# Configuraciï¿½n JWT (con placeholders)
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wZXRjYXJlLWFwcA==}
jwt.expiration=86400000

# Configuraciï¿½n de logging - DESARROLLO
# Para producciï¿½n usar: application-prod.properties
debug=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.petcare=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=INFO
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=INFO
# NO exponer passwords en logs
logging.level.org.springframework.security.core.userdetails.UserDetails=INFO

# Configuraciï¿½n de Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.url=/v3/api-docs

# Actuator - Monitor
springdoc.show-actuator=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Activar el perfil "local" para desarrollo
spring.profiles.active=local