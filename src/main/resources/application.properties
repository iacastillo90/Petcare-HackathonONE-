spring.application.name=Petcare

# ===================================================================
# BASE DATABASE CONFIGURATION (Local / MySQL)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petcare}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway (Activado para desarrollo local)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.address=0.0.0.0
server.port=${PORT:8080}
server.forward-headers-strategy=native

# ===================================================================
# JWT & SECURITY
# ===================================================================
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wZXRjYXJlLWFwcA==}
jwt.expiration=86400000

# ===================================================================
# EMAIL CONFIGURATION
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@petcare.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Perfil activo por defecto (si no hay variables de entorno)
spring.profiles.active=local