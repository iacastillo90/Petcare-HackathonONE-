spring.application.name=Petcare

# ===================================================================
# BASE DATABASE CONFIGURATION (Dinamizada)
# ===================================================================
# Spring detectarß el Driver automßticamente por la URL, pero es mejor definir placeholders genķricos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petcare}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Hibernate / JPA - Ajuste automßtico seg·n la base de datos detectada
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# SERVER CONFIGURATION (Vital para Render)
# ===================================================================
server.address=0.0.0.0
server.port=${PORT:8080}
server.forward-headers-strategy=native

# ===================================================================
# JWT & SECURITY
# ===================================================================
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wZXRjYXJlLWFwcA==}
jwt.expiration=86400000

# ===================================================================
# OTRAS CONFIGURACIONES (Email, Swagger, etc.)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@petcare.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:password}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Perfil activo por defecto
spring.profiles.active=local