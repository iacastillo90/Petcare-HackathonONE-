services:
  petcare:
    build:
      context: .
      no_cache: true
    network_mode: host
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8088
      - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/petcare
      - SPRING_DATASOURCE_USERNAME=petcare_user
      - SPRING_DATASOURCE_PASSWORD=petcare_pass
    depends_on:
      - petcare-db
  petcare-db:
    image: mysql:latest
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=petcare
      - MYSQL_USER=petcare_user
      - MYSQL_PASSWORD=petcare_pass
    volumes:
      - mysql-volume:/var/lib/mysql

volumes:
  mysql-volume: