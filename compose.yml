# ===================================================================
# Petcare Application - Docker Compose
# ===================================================================
# Usage: docker compose up -d
# ===================================================================

services:
  # =================================================================
  # MySQL Database
  # =================================================================
  mysql:
    image: mysql:9.2.0
    container_name: petcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: petcare
      MYSQL_USER: petcare_user
      MYSQL_PASSWORD: petcare_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - petcare-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =================================================================
  # Petcare Spring Boot Application
  # =================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petcare-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8088:8088"
    networks:
      - petcare-network

  # =================================================================
  # Nginx Reverse Proxy
  # =================================================================
  nginx:
    image: nginx:latest
    container_name: petcare-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl:ro
    networks:
      - petcare-network

networks:
  petcare-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  nginx_ssl:
    driver: local
