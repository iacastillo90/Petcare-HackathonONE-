# ===================================================================
# Petcare Application - Docker Compose
# ===================================================================
# Usage: docker compose up -d
# ===================================================================

services:
  # =================================================================
  # MySQL Database
  # =================================================================
  mysql:
    image: mysql:9.2.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =================================================================
  # Petcare Spring Boot Application
  # =================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - 8088
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  mysql_data:
    driver: local
